name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Show workspace before build
        run: |
          pwd
          ls -la
          ls -la dist || true
          ls -la unpackage || true

      - name: Build H5
        run: npx @dcloudio/cli build -p h5

      - name: Detect build output path
        id: detect
        run: |
          if [ -d "dist/build/h5" ]; then
            echo "path=dist/build/h5" >> "$GITHUB_OUTPUT"
          elif [ -d "unpackage/dist/build/h5" ]; then
            echo "path=unpackage/dist/build/h5" >> "$GITHUB_OUTPUT"
          else
            echo "Build output not found."
            echo "Checked: dist/build/h5 and unpackage/dist/build/h5"
            ls -la
            ls -la dist || true
            ls -la unpackage || true
            exit 1
          fi

      - name: Show selected artifact path
        run: |
          echo "Selected path: ${{ steps.detect.outputs.path }}"
          ls -la "${{ steps.detect.outputs.path }}"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.detect.outputs.path }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
